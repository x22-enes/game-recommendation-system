services:
  - type: web
    name: game-recommendation-system
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: cd backend && npx prisma db push && cd .. && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: USE_LIVE_APIS
        value: "false"
      - key: VITE_API_URL
        value: ""
